# ──────────────────────────────────────────────────────────────
# IE Core FHIR IG – Local Development & Testing
#
# Usage:
#   Build R4 IG:       docker compose run --rm ig-builder
#   Build R4 + R5:     docker compose run --rm ig-builder bash _genonce_all.sh
#   Preview output:    docker compose up ig-preview          (http://localhost:3000)
#   Run test suite:    docker compose run --rm ig-test
#
# All services share the repository root as /workspace.
# The input-cache volume persists the downloaded publisher.jar between runs.
# ──────────────────────────────────────────────────────────────

services:

  # ──────────────────────────────────────────────────────────
  # IG Builder – SUSHI (FSH → FHIR JSON) + HL7 IG Publisher
  # ──────────────────────────────────────────────────────────
  ig-builder:
    image: node:20
    container_name: ie-core-ig-builder
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ig-cache:/workspace/input-cache
    environment:
      # Give the JVM enough heap for the IG Publisher
      JAVA_TOOL_OPTIONS: "-Xmx4g -Dfile.encoding=UTF-8"
    command: >-
      bash -c "
        echo '==> Installing Java runtime...' &&
        apt-get update -qq &&
        apt-get install -y --no-install-recommends default-jre-headless &&
        echo '==> Installing SUSHI...' &&
        npm install -g fsh-sushi --silent &&
        echo '==> Downloading IG Publisher (if needed)...' &&
        bash ./_updatePublisher.sh &&
        echo '==> Running IG build...' &&
        bash ./_genonce.sh
      "
    profiles:
      - build

  # ──────────────────────────────────────────────────────────
  # IG Preview – serve the generated output/ directory
  # Open http://localhost:3000 after a successful build.
  # ──────────────────────────────────────────────────────────
  ig-preview:
    image: nginx:alpine
    container_name: ie-core-ig-preview
    ports:
      - "3000:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
    restart: unless-stopped
    profiles:
      - preview

  # ──────────────────────────────────────────────────────────
  # IG Test – Cucumber BDD + FHIR Validator test suite
  # ──────────────────────────────────────────────────────────
  ig-test:
    image: node:20-alpine
    container_name: ie-core-ig-test
    working_dir: /workspace/tests
    volumes:
      - .:/workspace
    command: >-
      sh -c "npm ci && npm run download:validator && npm test"
    profiles:
      - test

volumes:
  # Caches publisher.jar between builds to avoid re-downloading on every run
  ig-cache: {}
