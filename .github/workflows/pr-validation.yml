name: PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'input/fsh/**'
      - 'sushi-config.yaml'
      - 'ig.ini'

jobs:
  quick-check:
    name: Quick FSH Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Run SUSHI
        run: |
          sushi .
          echo "SUSHI compilation: $?"

      - name: Summary
        run: |
          echo "## SUSHI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          PROFILES=$(find fsh-generated/resources -name "StructureDefinition-*.json" | wc -l)
          VALUESETS=$(find fsh-generated/resources -name "ValueSet-*.json" | wc -l)
          CODESYSTEMS=$(find fsh-generated/resources -name "CodeSystem-*.json" | wc -l)
          EXAMPLES=$(find fsh-generated/resources -name "*.json" -not -name "StructureDefinition-*" \
            -not -name "ValueSet-*" -not -name "CodeSystem-*" \
            -not -name "CapabilityStatement-*" -not -name "SearchParameter-*" \
            -not -name "ImplementationGuide-*" | wc -l)
          echo "| Artifact | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Profiles/Extensions | $PROFILES |" >> $GITHUB_STEP_SUMMARY
          echo "| ValueSets | $VALUESETS |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeSystems | $CODESYSTEMS |" >> $GITHUB_STEP_SUMMARY
          echo "| Examples/Instances | $EXAMPLES |" >> $GITHUB_STEP_SUMMARY
