# IE (Ireland) Core Implementation Guide — FHIR R5 Edition
id: hl7.fhir.ie.core.r5
canonical: https://hl7-ie.github.io/hl7-ie-fhir-draft-ig/fhir/ie/core-r5
name: IECoreR5
title: "IE (Ireland) Core Implementation Guide — FHIR R5"
description: >-
  **⚠️ Proof of Concept (PoC):** This Implementation Guide is built as a Proof of Concept by Nithin Mohan.
  It has no support from the HSE, HSE Standards team, or Department of Health.
  In future, this may be handed over to a governing body within Ireland for maintaining this implementation guide.
  This IG is the author's proof of concept to demonstrate how FHIR adoption should be implemented at the national level.
  
  FHIR R5 edition of the IE Core Implementation Guide. This IG mirrors the R4
  edition and will progressively diverge as R5-specific features (subscriptions,
  SubscriptionTopic, new resource types) are adopted. It derives from the HL7
  Europe Base and Core R5 profiles for EHDS conformance.
