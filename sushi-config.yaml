id: hl7.fhir.ie.core
canonical: http://hl7.hse.ie/fhir/ie/core
name: IECore
title: "IE (Ireland) Core Implementation Guide"
description: >-
  The IE Core Implementation Guide is based on FHIR Version R4 and defines the minimum
  constraints on the FHIR resources to create the IE Core Profiles. It also documents
  the minimum FHIR RESTful interactions for each IE Core Profile to access patient data.
  This IG is developed and maintained in collaboration with the Health Service Executive (HSE),
  the Irish College of General Practitioners (ICGP), and the Department of Health.
  IE Core profiles derive from the HL7 Europe Base and Core profiles to ensure conformance
  with the European Health Data Space (EHDS) and cross-border interoperability via the
  International Patient Summary (IPS) standard.
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2025+
