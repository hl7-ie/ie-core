id: hl7.fhir.ie.core
canonical: http://hl7.hse.ie/fhir/ie/core
name: IECore
title: "IE (Ireland) Core Implementation Guide"
description: >-
  The IE Core Implementation Guide is based on FHIR Version R4 and defines the minimum
  constraints on the FHIR resources to create the IE Core Profiles. It also documents
  the minimum FHIR RESTful interactions for each IE Core Profile to access patient data.
  This IG is developed and maintained in collaboration with the Health Service Executive (HSE),
  the Irish College of General Practitioners (ICGP), and the Department of Health.
status: draft
version: 0.1.0
fhirVersion: 4.0.1
copyrightYear: 2025+
releaseLabel: ci-build
license: CC-BY-4.0
jurisdiction: urn:iso:std:iso:3166#IE "Ireland"
publisher:
  name: HL7 Ireland / HSE FHIR Working Group
  url: http://hl7.hse.ie
  email: fhir@hse.ie

dependencies:
  hl7.fhir.uv.extensions.r4: 5.1.0

parameters:
  show-hierarchical-table: true
  apply-jurisdiction: true
  apply-publisher: true
  jira-code: ie-core
  path-expansion-params: ../../input/_resources/exp-params.json
  active-tables: false
  apply-contact: true
  apply-version: true
  usage-stats-opt-out: true
  excludexml: false
  excludejson: false
  excludettl: true
  excludemap: true

