groups:
  PatientProfiles:
    name: Patient Demographics
    description: Profiles related to patient demographics and identification
    resources:
      - StructureDefinition/ie-core-patient
      - StructureDefinition/ie-core-relatedperson
  ProviderProfiles:
    name: Provider & Organization
    description: Profiles for healthcare providers and organizations
    resources:
      - StructureDefinition/ie-core-practitioner
      - StructureDefinition/ie-core-practitionerrole
      - StructureDefinition/ie-core-organization
      - StructureDefinition/ie-core-location
  ClinicalProfiles:
    name: Clinical
    description: Core clinical profiles
    resources:
      - StructureDefinition/ie-core-allergyintolerance
      - StructureDefinition/ie-core-condition-encounter-diagnosis
      - StructureDefinition/ie-core-condition-problems-health-concerns
      - StructureDefinition/ie-core-procedure
      - StructureDefinition/ie-core-careplan
      - StructureDefinition/ie-core-careteam
      - StructureDefinition/ie-core-goal
      - StructureDefinition/ie-core-servicerequest
      - StructureDefinition/ie-core-encounter
  MedicationProfiles:
    name: Medication
