id: hl7.fhir.ie.core
canonical: https://hl7-ie.github.io/ie-core/fhir/ie/core
name: IECore
title: "IE (Ireland) Core Implementation Guide"
description: >-
  **вҡ пёҸ Proof of Concept (PoC):** This Implementation Guide is built as a Proof of Concept by Nithin Mohan.
  It has no support from the HSE, HSE Standards team, or Department of Health.
  In future, this may be handed over to a governing body within Ireland for maintaining this implementation guide.
  This IG is the author's proof of concept to demonstrate how FHIR adoption should be implemented at the national level.
  It is built with the author's experiences working in HL7 V2, V3 CDA, and FHIR, and a curiosity to solve problems for EHDS
  cross-border healthcare from the context of Ireland's healthcare landscape.
  
  The IE Core Implementation Guide is based on FHIR Version R4 and defines the minimum constraints on FHIR resources 
  to create the IE Core Profiles. It also documents the minimum FHIR RESTful interactions for each IE Core Profile to 
  access patient data. IE Core profiles derive from the HL7 Europe Base and Core profiles to ensure conformance
  with the European Health Data Space (EHDS) and cross-border interoperability via the International Patient Summary (IPS) standard.
